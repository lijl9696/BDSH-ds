name: Build Windows App

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build executable
        shell: pwsh
        run: |
          python -m PyInstaller packaging/windows/tg_report_tool.spec --noconfirm --clean

      - name: Copy runtime folders
        shell: pwsh
        run: |
          $appDir = "dist/团购报表工具"
          Copy-Item -Path "配置表" -Destination "$appDir/配置表" -Recurse -Force
          if (Test-Path "assets") {
            Copy-Item -Path "assets" -Destination "$appDir/assets" -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path "$appDir/outputs" | Out-Null
          New-Item -ItemType Directory -Force -Path "$appDir/data" | Out-Null

      - name: Create delivery zip
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/团购报表工具" -DestinationPath "dist/团购报表工具-Windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 团购报表工具-Windows
          path: dist/团购报表工具-Windows.zip
