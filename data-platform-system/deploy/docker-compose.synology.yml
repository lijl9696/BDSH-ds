services:
  postgres:
    image: postgres:16
    container_name: tg-report-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tg_report
      POSTGRES_USER: tg_report
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5729}:5432"
    volumes:
      - ${TG_REPORT_DATA_DIR:?set TG_REPORT_DATA_DIR in .env}/postgres:/var/lib/postgresql/data
      - ../report-platform/db/init:/docker-entrypoint-initdb.d:ro

  metabase:
    image: metabase/metabase:v0.52.4
    container_name: tg-report-metabase
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${METABASE_PORT:-3000}:3000"
    volumes:
      - ${TG_REPORT_DATA_DIR:?set TG_REPORT_DATA_DIR in .env}/metabase:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db

  report-web:
    image: ${REPORT_WEB_IMAGE:-ghcr.io/lijl9696/bdsh-ds-report-web:latest}
    container_name: tg-report-web
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "${REPORT_WEB_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://tg_report:${POSTGRES_PASSWORD}@postgres:5432/tg_report
      UPLOAD_DIR: /data/uploads
      PRESET_PATH: /app/config/report_presets.yml
      PLATFORM_PROFILE_PATH: /app/config/platform_profiles.yml
      IMPORT_AUTH_USERNAME: ${IMPORT_AUTH_USERNAME:-admin}
      IMPORT_AUTH_PASSWORD: ${IMPORT_AUTH_PASSWORD:?set IMPORT_AUTH_PASSWORD in .env}
      DASHBOARD_URL: ${DASHBOARD_URL:-}
    volumes:
      - ${TG_REPORT_DATA_DIR:?set TG_REPORT_DATA_DIR in .env}/uploads:/data/uploads

  collector:
    image: ${COLLECTOR_IMAGE:-ghcr.io/lijl9696/bdsh-ds-collector:latest}
    container_name: tg-report-collector
    restart: unless-stopped
    depends_on:
      - report-web
    environment:
      REPORT_WEB_BASE_URL: http://report-web:8000
      IMPORT_AUTH_USERNAME: ${IMPORT_AUTH_USERNAME:-admin}
      IMPORT_AUTH_PASSWORD: ${IMPORT_AUTH_PASSWORD:?set IMPORT_AUTH_PASSWORD in .env}
      DATABASE_URL: postgresql://tg_report:${POSTGRES_PASSWORD}@postgres:5432/tg_report
      WECOM_WEBHOOK_URL: ${WECOM_WEBHOOK_URL:-}
      WECOM_DAILY_REPORT_CRON: ${WECOM_DAILY_REPORT_CRON:-40 8 * * *}
      WECOM_FRANCHISE_WEBHOOK_URL: ${WECOM_FRANCHISE_WEBHOOK_URL:-}
      WECOM_FRANCHISE_REPORT_CRON: ${WECOM_FRANCHISE_REPORT_CRON:-45 8 * * *}
      WECOM_REPORT_FONT_PATH: ${WECOM_REPORT_FONT_PATH:-}
      WECOM_REPORT_LOGO_PATH: ${WECOM_REPORT_LOGO_PATH:-}
      COLLECTOR_JOBS_PATH: /app/config/jobs.yml
      COLLECTOR_DOWNLOADS_DIR: /app/downloads
      COLLECTOR_STATE_DIR: /app/state
      COLLECTOR_LOGS_DIR: /app/logs
      COLLECTOR_HEADLESS: "true"
      COLLECTOR_TIMEZONE: Asia/Shanghai
      TZ: Asia/Shanghai
    volumes:
      - ${TG_REPORT_DATA_DIR:?set TG_REPORT_DATA_DIR in .env}/collector/downloads:/app/downloads
      - ${TG_REPORT_DATA_DIR:?set TG_REPORT_DATA_DIR in .env}/collector/state:/app/state
      - ${TG_REPORT_DATA_DIR:?set TG_REPORT_DATA_DIR in .env}/collector/logs:/app/logs
      - ${TG_REPORT_DATA_DIR:?set TG_REPORT_DATA_DIR in .env}/collector/config/jobs.yml:/app/config/jobs.yml:ro

  backup:
    image: postgres:16
    container_name: tg-report-backup
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - ${TG_REPORT_DATA_DIR:?set TG_REPORT_DATA_DIR in .env}/backups:/backups
    command: >
      sh -c "while true; do
      pg_dump -h postgres -U tg_report tg_report | gzip > /backups/tg_report_$$(date +%F_%H%M%S).sql.gz;
      find /backups -name 'tg_report_*.sql.gz' -mtime +30 -delete;
      sleep 86400;
      done"
