jobs:
  - code: meituan_daily
    enabled: false
    platform_code: meituan
    schedule_cron: "30 6 * * *"
    state_file: meituan_state.json
    report_page_url: "https://e.dianping.com/app/merchant-platform/0fb1bec0bade47d?iUrl=Ly9oNS5kaWFucGluZy5jb20vdmctcGMtYWR2aWNlL3JlcG9ydC1jZW50ZXIvaW5kZXguaHRtbA"
    download_mode: direct
    steps:
      - action: click
        selector: "text=使用模板"
      - action: wait
        seconds: 2
      # TODO: 根据弹窗真实 DOM 调整时间范围选择器。
      # - action: click
      #   selector: "text=选择时间范围"
      # - action: click
      #   selector: "text=最近30天"
    download_selector: "text=下载"
    duplicate_policy: skip
    wait_after_trigger_seconds: 2
    download_timeout_seconds: 600

  - code: douyin_daily
    enabled: false
    platform_code: douyin
    schedule_cron: "0 7 * * *"
    state_file: douyin_state.json
    report_page_url: "https://example.com/douyin/report-page"
    download_mode: download_center
    steps:
      - action: click
        selector: "text=生成报表"
    download_center_url: "https://example.com/douyin/download-center"
    download_selector: "text=下载"
    duplicate_policy: skip
    wait_after_trigger_seconds: 10
    download_timeout_seconds: 600
